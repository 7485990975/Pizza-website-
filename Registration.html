<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pizza App Signup</title>

    <link rel="stylesheet" href="form.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="registration.js" defer></script>
</head>
<body>

<div class="cheesyBox">
    <h2 class="tastyTitle">🍕 Join Pizza Hub</h2>

    <form id="pizzaForm">

        <label class="yummyLabel">Your Name</label>
        <input type="text" id="name" class="sliceInput" placeholder="Enter your name">
        <div class="burntMsg"></div>

        <label class="yummyLabel">Email</label>
        <input type="text" id="email" class="sliceInput" placeholder="abc@gmail.com">
        <div class="burntMsg"></div>

        <label class="yummyLabel">Password</label>
        <input type="password" id="pass" class="sliceInput" placeholder="Start with capital, min 6">
        <div class="burntMsg"></div>

        <button type="submit" class="orderBtn">Create My Pizza Account</button>

    </form>
</div>

</body>
</html>
